<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .dropdown {
        position: relative;
        width: 100px;
      }
      .dropdown-content {
        display: none;
        position: absolute;
        background-color: lightgray;
        width: 100%;
        height: 50px;
        padding: 10px;
        font-weight: 700;
      }
      .dropdown:hover .dropdown-content {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="dropdown">
      <p>Hello</p>
      <div class="dropdown-content">
        <p>I am Fuad</p>
      </div>
      
    </div>
    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Ipsam quod
        molestias eveniet. Nihil, cum cumque quam sed consequatur quis eaque?
      </p>
  </body>
</html>
