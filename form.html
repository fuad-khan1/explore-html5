<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Information</h1>
    <form action="">
      <p>
        Name:
        <input type="text" name="name" placeholder="Enter your name" id="" />
      </p>
      <p>
        Email:
        <input type="email" name="email" placeholder="Enter your email" id="" />
      </p>
      <fieldset>
        <legend>Choose your subject</legend>
        <label for="Bangla">
          <p><input type="radio" name="subject" id="Bangla" />Bangla</p></label
        >
        <label for="English"
          ><p>
            <input type="radio" name="subject" id="English" />English
          </p></label
        >
        <label for="Math">
          <p><input type="radio" name="subject" id="Math" />Math</p></label
        >
      </fieldset>
      <fieldset>
        <legend>Choose your extra-subjects</legend>
        <label for="Agri"
          ><p>
            <input type="checkbox" name="extra-subject" id="Agri" />Agri
          </p></label
        >
        <label for="Biology"
          ><p>
            <input type="checkbox" name="extra-subject" id="Biology" />Biology
          </p></label
        >
        <label for="Sports">
          <p>
            <input type="checkbox" name="extra-subject" id="Sports" />Sports
          </p></label
        >
      </fieldset>
      <p>Your Opinion:</p>
      <textarea name="opinion" id="" cols="30" rows="10"> </textarea>
      <br />
      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </body>
</html>
